name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm@11.5.2 requires Node >= 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds packages (core/tokens) then the Storybook static site.
      - name: Build Storybook
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/storybook/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
